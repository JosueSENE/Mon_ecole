            <!-- User Info Badge -->

            <div class="flex flex-wrap gap-1">
                <button onclick="switchTab('INSCRIPTION')" id="tab-btn-INSCRIPTION" class="tab-btn flex items-center space-x-2 px-3.5 py-2 text-xs font-black uppercase tracking-wider rounded-xl transition">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Inscrire Élève</span>
                </button>
                <button onclick="switchTab('STUDENTS')" id="tab-btn-STUDENTS" class="tab-btn flex items-center space-x-2 px-3.5 py-2 text-xs font-black uppercase tracking-wider rounded-xl transition">
                    <i class="fa-solid fa-address-card"></i>
                    <span>Registre Général</span>
                </button>
                <button onclick="switchTab('SUBJECTS')" id="tab-btn-SUBJECTS" class="tab-btn flex items-center space-x-2 px-3.5 py-2 text-xs font-black uppercase tracking-wider rounded-xl transition">
                    <i class="fa-solid fa-book"></i>
                    <span>Gestion Matières</span>
                </button>
                <button onclick="switchTab('BULLETINS')" id="tab-btn-BULLETINS" class="tab-btn flex items-center space-x-2 px-3.5 py-2 text-xs font-black uppercase tracking-wider rounded-xl transition">

                <button onclick="switchTab('STATS')" id="tab-btn-STATS" class="tab-btn flex items-center space-x-2 px-3.5 py-2 text-xs font-black uppercase tracking-wider rounded-xl transition">

        <p class="text-[10px] text-slate-650 mt-1">Plateforme Scolaire Administrative d'Onboarding Directement Connectée à la Base Local</p>
    </footer>

    <!-- INLINE LOGICS INTERACTIVITY -->
    <script src="db_data.php"></script>
    <script src="data.js"></script>
    <script>
        let currentTab = 'STU_MGR';

        // Local reactive filter trackers
        let secretaireActiveTermFilter = '3e Trimestre';
        let secretaireActiveGradeFilter = 'CM2';
        let secretaireActiveDivisionFilter = 'A';
        let studentClassFilter = 'Tous';
        let secretaireActiveSubjectLevel = 'CM2';

        window.addEventListener('load', () => {
            if (window.initStorage) {
                window.initStorage();
            }

            const sessionStr = localStorage.getItem('school_session');
            if (!sessionStr) {
                const demoUser = { role: 'SECRETAIRE', name: "Awa Ndiaye (Secrétariat)", email: "secretaire@sunuecole.sn" };
                localStorage.setItem('school_session', JSON.stringify(demoUser));
                window.showToast("ℹ️ Connexion auto de démonstration (Secrétariat).", "info");
            } else {
                const session = JSON.parse(sessionStr);
                if (session.role !== 'SECRETAIRE') {
                    window.location.href = "index.html";
                    return;
                }
                document.getElementById('header-username').innerText = session.name;
            }

            switchTab('STUDENTS');
        });


        function switchTab(tabId) {
            currentTab = tabId;
            window.currentTab = tabId;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn flex items-center space-x-2 px-3.5 py-2.5 text-xs font-black uppercase tracking-wider rounded-xl text-slate-400 hover:bg-slate-900 transition";
            });

            const activeBtn = document.getElementById(`tab-btn-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "tab-btn flex items-center space-x-2 px-3.5 py-2.5 text-xs font-black uppercase tracking-wider rounded-xl bg-slate-950 text-emerald-400 border border-slate-800 shadow transition";
            }

            const container = document.getElementById('screen-container');
            container.innerHTML = '';

            if (tabId === 'INSCRIPTION') renderInscription(container);
            if (tabId === 'STUDENTS') renderStudents(container);
            if (tabId === 'BULLETINS') renderBulletins(container);
            if (tabId === 'SUBJECTS') renderSubjects(container);
            if (tabId === 'STATS') renderStats(container);
        }

        // ================= SCREEN 1: REGISTER STUDENT =================
        function renderInscription(container) {
            const nextMatriculeInt = window.db.students.length > 0 ? Math.max(...window.db.students.map(s => s.id)) + 1 : 1;
            const nextMatriculeString = "SN-2026-" + String(nextMatriculeInt).padStart(3, '0');

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl max-w-2xl mx-auto shadow-md space-y-4">
                        <div class="flex items-center space-x-3 border-b border-slate-800 pb-3">
                            <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 text-lg rounded-lg flex items-center justify-center font-bold">
                                <i class="fa-solid fa-address-card"></i>
                            </div>
                            <div>
                                <h4 class="text-sm font-black text-white uppercase tracking-wider">Fiche d'Inscription Administrative</h4>
                                <p class="text-[11px] text-slate-500 font-semibold uppercase mt-0.5">Scolarité d'Excellence du CI au CM2</p>
                            </div>
                        </div>

                        <form id="inscription-form" onsubmit="handleNewStudentSubmit(event)" class="space-y-4 pt-1.5">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Prénom de l'Élève</label>
                                    <input type="text" id="s-firstname" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 placeholder-slate-700 focus:outline-emerald-500 font-bold" placeholder="Ex: Souleymane">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nom de Famille</label>
                                    <input type="text" id="s-lastname" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 placeholder-slate-700 focus:outline-emerald-500 font-black uppercase" placeholder="Ex: DIALLO">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Genre</label>
                                    <select id="s-gender" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 font-bold">
                                        <option value="M">Masculin (Garçon)</option>
                                        <option value="F">Féminin (Fille)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Date de naissance</label>
                                    <input type="date" id="s-birthdate" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 font-bold">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Niveau d'Affectation</label>
                                    <select id="s-grade" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 font-bold">
                                        <option value="CI">CI (Cours d'initiation)</option>
                                        <option value="CP">CP (Cours préparatoire)</option>
                                        <option value="CE1">CE1 (Cours élémentaire 1)</option>
                                        <option value="CE2">CE2 (Cours élémentaire 2)</option>
                                        <option value="CM1">CM1 (Cours moyen 1)</option>
                                        <option value="CM2">CM2 (Cours moyen 2)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Division d'élèves</label>
                                    <select id="s-division" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 font-bold">
                                        <option value="A">Division A</option>
                                        <option value="B">Division B</option>
                                        <option value="C">Division C</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Numéro GSM du tuteur/parent</label>
                                <input type="text" id="s-contact" required class="w-full bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-slate-100 placeholder-slate-750 focus:outline-emerald-500 font-mono font-bold" placeholder="Ex: +221 77 123 45 67">
                            </div>

                            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                <div>
                                    <span class="text-[9px] text-slate-500 font-black uppercase tracking-wider block">Matricule Attribué de Suite</span>
                                    <span class="font-mono text-sm font-black text-indigo-400">${nextMatriculeString}</span>
                                </div>
                                <span class="px-2 py-0.5 text-[9px] font-extrabold text-indigo-400 bg-indigo-500/10 rounded border border-indigo-500/20 uppercase tracking-widest font-mono">Génération automatique</span>
                            </div>

                            <button type="submit" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black text-xs uppercase rounded-lg transition hover:scale-[1.015]">
                                Confirmer l'Inscription
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function handleNewStudentSubmit(event) {
            event.preventDefault();
            const firstname = document.getElementById('s-firstname').value.trim();
            const lastname = document.getElementById('s-lastname').value.trim();
            const gender = document.getElementById('s-gender').value;
            const birthdate = document.getElementById('s-birthdate').value;
            const grade = document.getElementById('s-grade').value;
            const division = document.getElementById('s-division').value;
            const contact = document.getElementById('s-contact').value.trim();

            const nextId = window.db.students.length > 0 ? Math.max(...window.db.students.map(s => s.id)) + 1 : 1;
            const matricule = "SN-2026-" + String(nextId).padStart(3, '0');

            const obj = {
                id: nextId,
                firstName: firstname,
                lastName: lastname,
                classGrade: grade,
                classDivision: division,
                gender: gender,
                birthDate: birthdate,
                parentContact: contact,
                studentNumber: matricule
            };

            window.db.students.push(obj);
            window.saveToStorage('students');
            window.showToast(`🎉 Élève ${firstname} ${lastname} inscrit sous le matricule unique ${matricule}!`, 'success');
            switchTab('STUDENTS');
        }

        // ================= SCREEN 2: STUDENTS REGISTER =================
        function renderStudents(container) {
            const filteredStudents = studentClassFilter === 'Tous' 
                ? window.db.students 
                : window.db.students.filter(s => s.classGrade === studentClassFilter);

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl shadow-lg space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-800 pb-3">
                            <div>
                                <h4 class="text-sm font-black text-white uppercase tracking-wider flex items-center"><i class="fa-solid fa-address-book text-emerald-400 mr-2"></i>Registre Éléves & Fiche Parents</h4>
                                <p class="text-xs text-slate-500 mt-1">Registre global des élèves de SunuÉcole.</p>
                            </div>
                            <button onclick="switchTab('INSCRIPTION')" class="px-3.5 py-1.5 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black rounded-lg text-xs flex items-center space-x-1 transition hover:scale-105 select-none">
                                <i class="fa-solid fa-plus-circle"></i> <span>Inscrire un nouvel élève</span>
                            </button>
                        </div>

                        <!-- Class filter badges row -->
                        <div class="bg-slate-950 p-3 rounded-xl border border-slate-850 flex flex-col md:flex-row md:items-center justify-between gap-3">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider flex items-center">
                                <i class="fa-solid fa-filter text-emerald-500 mr-1.5"></i> Visualiser par Classe :
                            </span>
                            <div class="flex flex-wrap gap-1.5">
                                <button onclick="studentClassFilter='Tous'; renderStudents(document.getElementById('screen-container'))" 
                                    class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition ${studentClassFilter === 'Tous' ? 'bg-emerald-500 text-slate-950 shadow-md font-extrabold' : 'bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-300'}">
                                    Tous (${window.db.students.length})
                                </button>
                                ${['CI', 'CP', 'CE1', 'CE2', 'CM1', 'CM2'].map(lvl => {
                                    const count = window.db.students.filter(s => s.classGrade === lvl).length;
                                    return `
                                        <button onclick="studentClassFilter='${lvl}'; renderStudents(document.getElementById('screen-container'))" 
                                            class="px-2.5 py-1.5 rounded-lg text-[10px] font-black uppercase transition ${studentClassFilter === lvl ? 'bg-emerald-500 text-slate-950 shadow-md font-extrabold' : 'bg-slate-900 border border-slate-800 text-slate-400 hover:text-slate-300'}">
                                            ${lvl} (${count})
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <div class="overflow-x-auto text-left">
                            <table class="w-full text-xs text-left">
                                <thead class="bg-slate-950 text-slate-500 text-[9px] uppercase border-b border-slate-800">
                                    <tr>
                                        <th class="p-3">Matricule</th>
                                        <th class="p-3">Identité Prénom & Nom</th>
                                        <th class="p-3 animate-pulse">Genre</th>
                                        <th class="p-3">Classe</th>
                                        <th class="p-3">Date Naissance</th>
                                        <th class="p-3">GSM Parent / Tuteur</th>
                                        <th class="p-3 text-right font-bold">Actions administrative</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-800/40">
                                    ${filteredStudents.length === 0 ? `
                                        <tr>
                                            <td colspan="7" class="p-6 text-center text-slate-500 italic">Aucun élève inscrit dans cette catégorie scolaire.</td>
                                        </tr>
                                    ` : filteredStudents.map(s => `
                                        <tr class="hover:bg-slate-950/40">
                                            <td class="p-3 font-mono text-[10px] font-black text-indigo-400">${s.studentNumber}</td>
                                            <td class="p-3 font-extrabold text-slate-200">${s.firstName} ${s.lastName}</td>
                                            <td class="p-3">
                                                ${s.gender === 'F' ? '<span class="text-rose-400 font-bold"><i class="fa-solid fa-venus mr-1"></i>Fille</span>' : '<span class="text-cyan-400 font-bold"><i class="fa-solid fa-mars mr-1"></i>Garçon</span>'}
                                            </td>
                                            <td class="p-3">
                                                <span class="px-2.5 py-1 bg-slate-800 text-slate-300 rounded font-black">${s.classGrade}-${s.classDivision}</span>
                                            </td>
                                            <td class="p-3 font-mono text-slate-450">${s.birthDate}</td>
                                            <td class="p-3 font-mono text-slate-300">${s.parentContact || 'Non affecté'}</td>
                                            <td class="p-3 text-right flex justify-end space-x-1.5">
                                                <button onclick="sendStudentInviteSms('${s.parentContact}', '${s.firstName}', '${s.lastName}', '${s.studentNumber}')" class="px-2 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-[10px] font-bold transition flex items-center space-x-1" title="SMS invitation">
                                                    <i class="fa-solid fa-comment-sms text-[11px] text-emerald-400 animate-bounce"></i> <span>Invite SMS</span>
                                                </button>
                                                <button onclick="deleteStudent(${s.id})" class="p-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded transition" title="Radier">
                                                    <i class="fa-solid fa-trash-can"></i>
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function deleteStudent(id) {
            if (confirm("⚠️ Alerte CRITIQUE : Souhaitez-vous vraiment radier cet élève définitivement ? \nToutes ses notes et traces de présences seront supprimées du registre.")) {
                window.db.students = window.db.students.filter(x => x.id !== id);
                window.db.grades = window.db.grades.filter(g => g.studentId !== id);
                window.db.attendance = window.db.attendance.filter(a => a.studentId !== id);
                window.db.signedBulletins = window.db.signedBulletins.filter(s => s.studentId !== id);
                
                window.saveToStorage('students');
                window.saveToStorage('grades');
                window.saveToStorage('attendance');
                window.saveToStorage('signedBulletins');
                
                window.showToast("🛑 Radiation effectuée avec succès.");
                switchTab('STUDENTS');
            }
        }

        function sendStudentInviteSms(phone, fn, ln, code) {
            if (window.sendStudentInviteSms) {
                window.sendStudentInviteSms(phone, fn, ln, code);
            }
        }

        // ================= SCREEN 4: SUBJECTS MANAGEMENT =================
        function renderSubjects(container) {
            const filteredSubjects = window.db.subjects.filter(s => s.level === secretaireActiveSubjectLevel);

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <!-- Head level selector -->
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-md">
                        <div class="space-y-1">
                            <h4 class="text-sm font-black text-white uppercase tracking-wide flex items-center">
                                <i class="fa-solid fa-book-open text-emerald-400 mr-2"></i> Gestion des Matières & Composantes
                            </h4>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wide">Définir et configurer les coefficients officiels ainsi que les sous-matières par niveau scolaire.</p>
                        </div>

                        <div class="flex items-center space-x-2">
                            <span class="text-xs font-black text-slate-400 uppercase">Niveau :</span>
                            <select onchange="secretaireActiveSubjectLevel=this.value; renderSubjects(document.getElementById('screen-container'))" 
                                class="bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-white font-mono font-bold focus:outline-emerald-500">
                                <option value="CI" ${secretaireActiveSubjectLevel==='CI'?'selected':''}>CI (Cours Initiation)</option>
                                <option value="CP" ${secretaireActiveSubjectLevel==='CP'?'selected':''}>CP (Cours Préparatoire)</option>
                                <option value="CE1" ${secretaireActiveSubjectLevel==='CE1'?'selected':''}>CE1 (Cours Élémentaire 1)</option>

        function handleNewSubjectSubmit() {
            const name = document.getElementById('new-subj-name').value.trim();

            addSubject(secretaireActiveSubjectLevel, name, coeff);
        }

        function handleAddSubSubjectSubmit(subjectId) {
            const ssNameInput = document.getElementById(`new-ss-name-${subjectId}`);
            const name = ssNameInput.value.trim();
            addSubSubject(subjectId, name);
        }

        function addSubject(level, name, coefficient) {
            if(!name || !coefficient) {
                window.showToast("⚠️ Remplissez tous les champs", "error");
                return;
            }
            const nextId = window.db.subjects.length > 0 ? Math.max(...window.db.subjects.map(s => s.id)) + 1 : 1;
            const exists = window.db.subjects.some(s => s.level === level && s.name.toLowerCase() === name.toLowerCase());
            if(exists) {
                window.showToast("⚠️ Cette matière existe déjà pour ce niveau !", "error");
                return;
            }
            const newSubj = {
                id: nextId,
                name: name,
                level: level,
                coefficient: parseInt(coefficient) || 1,
                maxScore: 10
            };
            window.db.subjects.push(newSubj);
            window.saveToStorage('subjects');
            window.showToast(`🎉 Matière "${name}" ajoutée avec succès !`, "success");
            switchTab('SUBJECTS');
        }

        function deleteSubject(id) {
            if (confirm("⚠️ Alerte : Souhaitez-vous vraiment supprimer cette matière et toutes ses composantes ? Les relevés de notes déjà saisis pour cette matière perdront leur coefficient officiel.")) {
                window.db.subSubjects = window.db.subSubjects.filter(ss => ss.subjectId !== id);
                window.db.subjects = window.db.subjects.filter(s => s.id !== id);
                
                window.saveToStorage('subjects');
                window.saveToStorage('subSubjects');
                window.showToast("🛑 Matière et composantes supprimées.", "info");
                switchTab('SUBJECTS');
            }
        }

        function addSubSubject(subjectId, name) {
            if(!name) {
                window.showToast("⚠️ Précisez le nom de la composante", "error");
                return;
            }
            const nextId = window.db.subSubjects.length > 0 ? Math.max(...window.db.subSubjects.map(ss => ss.id)) + 1 : 1;
            const exists = window.db.subSubjects.some(ss => ss.subjectId === subjectId && ss.name.toLowerCase() === name.toLowerCase());
            if(exists) {
                window.showToast("⚠️ Cette composante existe déjà pour cette matière.", "error");
                return;
            }
            const newSub = {
                id: nextId,
                subjectId: subjectId,
                name: name
            };
            window.db.subSubjects.push(newSub);
            window.saveToStorage('subSubjects');
            window.showToast(`🎉 Composante "${name}" ajoutée !`, "success");
            switchTab('SUBJECTS');
        }

        function deleteSubSubject(id) {
            if (confirm("Supprimer cette composante ? Les notes associées perdront la liaison à cette composante.")) {
                window.db.subSubjects = window.db.subSubjects.filter(ss => ss.id !== id);
                window.saveToStorage('subSubjects');
                window.showToast("Composante retirée.", "info");
                switchTab('SUBJECTS');
            }
        }

                                <td style="text-align: center; font-weight: bold;">${sumCoeff}</td>
                            </tr>
                            <tr style="background: #e8f5e9;">
                                <td><strong>MOYENNE DU TRIMESTRE :</strong></td>
                                <td style="text-align: center; font-size: 14px; font-weight: 1000; color: #2e7d32;">${generalAvg} / 10</td>
                            </tr>
                        </table>

                        <div class="bottom-sect">
                            <table style="width: 100%;">
                                <tr>
                                    <td style="width: 50%; text-align: center; vertical-align: top;">
                                        <strong>Le Secrétariat Académique</strong><br>
                                        Awa Ndiaye<br>
                                        <div style="font-size: 11px; color:#555; margin-top: 10px;">Fiche Certifiée de Suite</div>
                                    </td>
                                    <td style="width: 50%; text-align: center; vertical-align: top;">
                                        <strong>Le Directeur de l'Établissement</strong><br>
                                        M. le Directeur Kane<br>
                                        ${isSigned ? 
                                            '<div class="stamp-green">🖋️ SIGNATURE APPLIQUÉE<br>VISA SCOLAIRE NUMÉRIQUE</div>' :

                                        }
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                `;
            });

            fullHtml += `
                <script>window.print();<\/script>
                </body>
                </html>
            `;

            printW.document.write(fullHtml);
            printW.document.close();
            window.showToast("🖨️ Génération du tirage groupé de bulletins en cours d'ouverture...", "success");
        }

        // ================= SCREEN 5: GENERAL SCHOOL STATISTICS =================
        function renderStats(container) {
            const totalStudents = window.db.students.length;
            const boys = window.db.students.filter(s => s.gender === 'M').length;
            const girls = window.db.students.filter(s => s.gender === 'F').length;

            const percentBoys = totalStudents > 0 ? (boys / totalStudents) * 100 : 50;
            const percentGirls = totalStudents > 0 ? (girls / totalStudents) * 100 : 50;

            const levels = ["CI", "CP", "CE1", "CE2", "CM1", "CM2"];
            const studPerLevel = levels.map(lvl => {
                const count = window.db.students.filter(s => s.classGrade === lvl).length;
                return { name: lvl, count: count };
            });

            const maxCount = Math.max(...studPerLevel.map(l => l.count), 1);

            // Compute global academic overview
            const terms = ["1er Trimestre", "2e Trimestre", "3e Trimestre"];
            const activeTerm = "1er Trimestre"; // default baseline
            const studentAverages = window.db.students.map(s => {
                const avg = window.calculateOverallAverage(s.id, activeTerm);
                return avg !== null ? avg : 7.2; // default avg for demo
            });
            const schoolAvg = studentAverages.length > 0 ? (studentAverages.reduce((acc, v) => acc + v, 0) / studentAverages.length) : 7.45;

            // Compute metrics count
            const certifiedBulletins = window.db.signedBulletins ? window.db.signedBulletins.filter(b => b.isSigned).length : 0;
            const totalGrades = window.db.grades.length;

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <!-- Title banner -->
                    <div class="bg-slate-900 border border-slate-800 px-5 py-4 rounded-xl flex items-center justify-between shadow">
                        <div>
                            <h3 class="text-sm font-black text-white uppercase tracking-wider">Statistiques Générales de l'Établissement</h3>
                            <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold">Indicateurs de gestion de scolarité globale.</p>
                        </div>
                        <div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-hotel"></i></div>
                    </div>

                    <!-- Metrics summary cards -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow">
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Effectif Total Inscrit</p>
                                <p class="text-2xl font-black text-white mt-0.5">${totalStudents} <span class="text-xs text-slate-500 font-normal">élèves</span></p>
                            </div>
                            <div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-users"></i></div>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow">
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Moyenne Générale École</p>
                                <p class="text-2xl font-black text-emerald-400 mt-0.5">${schoolAvg.toFixed(2)}/10</p>
                            </div>
                            <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-gauge-high"></i></div>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow">
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Évaluations Enregistrées</p>
                                <p class="text-2xl font-black text-cyan-400 mt-0.5">${totalGrades} <span class="text-xs text-slate-450 font-normal">unités</span></p>
                            </div>
                            <div class="w-10 h-10 bg-cyan-500/10 text-cyan-400 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-receipt"></i></div>
                        </div>

                        <div class="bg-slate-800/60 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow">
                            <div>
                                <p class="text-[10px] text-slate-550 font-bold uppercase tracking-wider">Bulletins Signés Kane</p>
                                <p class="text-2xl font-black text-amber-500 mt-0.5">${certifiedBulletins} <span class="text-xs text-slate-450 font-normal">avis</span></p>
                            </div>
                            <div class="w-10 h-10 bg-amber-500/10 text-amber-500 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-file-signature"></i></div>
                        </div>
                    </div>

                    <!-- Graphic representations -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        
                        <!-- Block 1: Class sizes bar diagram -->
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl space-y-4 shadow-md flex flex-col justify-between">
                            <h4 class="text-xs font-black text-white uppercase tracking-wider flex items-center">
                                <i class="fa-solid fa-chart-simple text-indigo-400 mr-2"></i> Distribution des Effectifs par Niveau
                            </h4>
                            <p class="text-[10px] text-slate-500 uppercase font-bold">Volumes d'élèves actuellement enregistrés par section scolaire.</p>

                            <div class="bg-slate-950 p-4 rounded-xl border border-slate-850 flex items-end justify-between h-41 pt-8 px-6">
                                ${studPerLevel.map(lvl => {
                                    const percent = (lvl.count / maxCount) * 80 + 10; // offset for layout
                                    return `
                                        <div class="flex flex-col items-center space-y-2 h-full justify-end w-1/8">
                                            <span class="text-[9px] font-black text-slate-400 font-mono">${lvl.count}</span>
                                            <div style="height: ${percent}%" class="w-6 bg-gradient-to-t from-indigo-600 to-indigo-400 rounded-t-md hover:scale-[1.05] transition-transform duration-300"></div>
                                            <span class="text-[9px] font-black text-slate-500 uppercase">${lvl.name}</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>

                        <!-- Block 2: Gender division Progress bars -->
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl space-y-4 shadow-md flex flex-col justify-between">
                            <h4 class="text-xs font-black text-white uppercase tracking-wider flex items-center">
                                <i class="fa-solid fa-venus-mars text-rose-450 mr-2"></i> Répartition par Genre d'Élevage
                            </h4>
                            <p class="text-[10px] text-slate-500 uppercase font-bold">Évaluation de la mixité scolaire au sein de l'établissement.</p>

                            <div class="bg-slate-950 p-5 rounded-xl border border-slate-850 space-y-4 flex-grow flex flex-col justify-center">
                                <!-- Girls metrics -->
                                <div class="space-y-1.5">
                                    <div class="flex items-center justify-between text-xs">
                                        <span class="text-rose-400 font-bold flex items-center"><i class="fa-solid fa-venus mr-1.5"></i> Filles (Féminin)</span>
                                        <span class="font-black font-mono text-slate-300">${percentGirls.toFixed(1)}% (${girls} élèves)</span>
                                    </div>
                                    <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden border border-slate-800">
                                        <div style="width: ${percentGirls}%" class="h-full bg-gradient-to-r from-rose-500 to-rose-400 rounded-full transition-all duration-500"></div>
                                    </div>
                                </div>

                                <!-- Boys metrics -->
                                <div class="space-y-1.5">
                                    <div class="flex items-center justify-between text-xs">
                                        <span class="text-cyan-400 font-bold flex items-center"><i class="fa-solid fa-mars mr-1.5"></i> Garçons (Masculin)</span>
                                        <span class="font-black font-mono text-slate-300">${percentBoys.toFixed(1)}% (${boys} élèves)</span>
                                    </div>
                                    <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden border border-slate-800">
                                        <div style="width: ${percentBoys}%" class="h-full bg-gradient-to-r from-cyan-500 to-cyan-450 rounded-full transition-all duration-500"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            `;
        }

    </script>
</body>
</html>
