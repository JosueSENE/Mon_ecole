    <script>
        let currentTab = 'DASHBOARD';

        // Local active variables

        let activeGradeFilter = 'CM2';
        let activeDivisionFilter = 'A';
        let selectedClassStats = 'CM2-A';

        // Security check
        window.addEventListener('load', () => {
            if (window.initStorage) {
                window.initStorage();
            }

            const sessionStr = localStorage.getItem('school_session');
            if (!sessionStr) {
                // If direct loading for test / demo, auto-authenticate
                const demoUser = { role: 'DIRECTEUR', name: "M. le Directeur Kane", email: "directeur@sunuecole.sn" };
                localStorage.setItem('school_session', JSON.stringify(demoUser));
                window.showToast("ℹ️ Connexion auto de démonstration (Directeur).", "info");
            } else {
                const session = JSON.parse(sessionStr);
                if (session.role !== 'DIRECTEUR') {
                    window.location.href = "index.html";
                    return;
                }
                document.getElementById('header-username').innerText = session.name;
            }

            // Draw Overview
            switchTab('DASHBOARD');
        });


        function switchTab(tabId) {
            currentTab = tabId;
            window.currentTab = tabId;

            // Paint buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn flex items-center space-x-2 px-3.5 py-2.5 text-xs font-black uppercase tracking-wider rounded-xl text-slate-400 hover:bg-slate-950 transition";
            });

            const activeBtn = document.getElementById(`tab-btn-${tabId}`);
            if (activeBtn) {
                activeBtn.className = "tab-btn flex items-center space-x-2 px-3.5 py-2.5 text-xs font-black uppercase tracking-wider rounded-xl bg-slate-950 text-emerald-400 border border-slate-800 shadow transition";
            }

            // Render
            const container = document.getElementById('screen-container');
            container.innerHTML = '';

            if (tabId === 'DASHBOARD') renderOverview(container);
            if (tabId === 'TEACHERS') renderTeachers(container);
            if (tabId === 'SUBJECTS') renderSubjects(container);
            if (tabId === 'BULLETINS') renderBulletins(container);
            if (tabId === 'STATS') renderStats(container);
        }

                            </div>
                            <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-lg flex items-center justify-center text-lg"><i class="fa-solid fa-chalkboard-user"></i></div>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between shadow">

        // ================== SCREEN 2: TEACHERS MANAGEMENT ==================

        function handleNewTeacherSubmit(event) {

            const classDivision = document.getElementById('t-div').value;

            const levels = ["CI", "CP", "CE1", "CE2", "CM1", "CM2"];
            const levelStats = levels.map(lv => {
                const stds = window.db.students.filter(s => s.classGrade === lv);
                let lvSum = 0;
                let count = 0;
                stds.forEach(st => {
                    const avg = window.calculateOverallAverage(st.id, "3e Trimestre");
                    if (avg !== null) {
                        lvSum += avg;
                        count++;
                    }
                });
                const finalAvg = count > 0 ? (lvSum / count) : (lv === 'CM2' ? 8.5 : lv === 'CE2' ? 7.2 : 6.8);
                return { level: lv, avg: finalAvg, count: stds.length };
            });

            container.innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <!-- Level stats visualizer -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- Demographics -->
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl space-y-4 shadow-md col-span-1 h-fit">
                            <h4 class="text-xs font-black text-white uppercase tracking-wider flex items-center"><i class="fa-solid fa-venus-mars text-emerald-400 mr-2"></i>Distribution des Genres d'Établissement</h4>
                            
                            <div class="flex items-center justify-around py-5 bg-slate-950 rounded-xl border border-slate-800/60 shadow">
                                <div class="text-center">
                                    <p class="text-slate-400 font-mono text-sm font-black text-rose-400"><i class="fa-solid fa-venus mr-1"></i>Filles</p>
                                    <p class="text-3xl font-black text-white mt-1">${girlsCount}</p>
                                    <p class="text-[11px] text-slate-500 mt-0.5">${girlsPct}% de l'école</p>
                                </div>
                                <div class="w-px h-12 bg-slate-800"></div>
                                <div class="text-center">
                                    <p class="text-slate-400 font-mono text-sm font-black text-cyan-400"><i class="fa-solid fa-mars mr-1"></i>Garçons</p>
                                    <p class="text-3xl font-black text-white mt-1">${boysCount}</p>
                                    <p class="text-[11px] text-slate-500 mt-0.5">${boysPct}% de l'école</p>
                                </div>
                            </div>

                            <div class="w-full bg-slate-950 h-6.5 rounded-full overflow-hidden flex text-[10px] font-black font-mono leading-relaxed border border-slate-800/60">
                                <div style="width: ${girlsPct}%" class="bg-rose-500 text-slate-950 flex items-center justify-center h-full">${girlsPct}% <i class="fa-solid fa-venus ml-1"></i></div>
                                <div style="width: ${boysPct}%" class="bg-cyan-500 text-slate-900 flex items-center justify-center h-full">${boysPct}% <i class="fa-solid fa-mars ml-1"></i></div>
                            </div>
                        </div>

                        <!-- Level averages Bar charts -->
                        <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl space-y-4 lg:col-span-2">
                            <h4 class="text-xs font-black text-white uppercase tracking-wider flex items-center"><i class="fa-solid fa-chart-line text-emerald-400 mr-2"></i>Moyennes Historiques Estimées par Niveau</h4>
                            <p class="text-xs text-slate-550 font-bold uppercase">Moyenne calculée des compositions de chaque niveau d'élèves.</p>
                            
                            <div class="space-y-3 pt-1">
                                ${levelStats.map(ls => {
                                    const percent = (ls.avg / 10) * 100;
                                    const colorClass = ls.avg >= 5 ? 'bg-gradient-to-r from-emerald-500 to-green-600' : 'bg-slate-600';
                                    return `
                                        <div class="space-y-1">
                                            <div class="flex justify-between text-xs">
                                                <span class="font-bold text-slate-200">Classe de ${ls.level} (${ls.count} élèves)</span>
                                                <span class="font-bold font-mono text-slate-300">${ls.avg.toFixed(2)} / 10</span>
                                            </div>
                                            <div class="w-full bg-slate-950 h-3 rounded-full overflow-hidden border border-slate-800">
                                                <div style="width: ${percent}%" class="h-full rounded-full transition-all duration-500 ${colorClass}"></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Selected class audits -->
                    <div class="bg-slate-900 border border-slate-800 p-5 rounded-xl space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                            <div>
                                <h4 class="text-sm font-black text-white uppercase tracking-wide flex items-center"><i class="fa-solid fa-building-flag text-emerald-400 mr-2"></i>Évaluation Détaillée de Classe</h4>
                                <p class="text-xs text-slate-500 mt-0.5">Auditez en direct l'assiduité, les notes, le classement et l'appréciation du professeur titulaire.</p>
                            </div>

                            <select onchange="selectedClassStats=this.value; renderStats(document.getElementById('screen-container'))" 
                                class="bg-slate-950 border border-slate-800 text-xs rounded-lg p-2.5 text-white font-mono font-bold focus:outline-emerald-500">
                                <option value="CI-A" ${selectedClassStats==='CI-A'?'selected':''}>Classe CI-A</option>
                                <option value="CP-A" ${selectedClassStats==='CP-A'?'selected':''}>Classe CP-A</option>
                                <option value="CE1-A" ${selectedClassStats==='CE1-A'?'selected':''}>Classe CE1-A</option>
                                <option value="CE2-A" ${selectedClassStats==='CE2-A'?'selected':''}>Classe CE2-A (Mme Diouf)</option>
                                <option value="CM1-A" ${selectedClassStats==='CM1-A'?'selected':''}>Classe CM1-A</option>
                                <option value="CM2-A" ${selectedClassStats==='CM2-A'?'selected':''}>Classe CM2-A (M. Fall)</option>
                            </select>
                        </div>

                        <hr class="border-slate-800">

                        ${(() => {
                            const [grade, division] = selectedClassStats.split("-");
                            const classStudents = window.db.students.filter(s => s.classGrade === grade && s.classDivision === division);
                            const tTeacher = window.db.teachers.find(t => t.classGrade === grade && t.classDivision === division);
                            const teacherName = tTeacher ? tTeacher.name : "Non désigné";

                            // Average of selected class
                            let scoreSum = 0;
                            let scoreCoeffSum = 0;
                            classStudents.forEach(s => {
                                window.db.grades.filter(g => g.studentId === s.id).forEach(g => {
                                    scoreSum += g.score * g.coefficient;
                                    scoreCoeffSum += g.coefficient;
                                });
                            });
                            const classAvg = scoreCoeffSum > 0 ? (scoreSum / scoreCoeffSum) : (grade === "CM2" ? 8.2 : grade === "CE2" ? 7.0 : 6.8);

                            // Attendance
                            const classAtt = window.db.attendance.filter(a => a.classGrade === grade && a.classDivision === division);
                            const presentsClass = classAtt.filter(a => a.status === 'Présent' || a.status === 'Retard').length;
                            const classAttendanceRate = classAtt.length > 0 ? (presentsClass / classAtt.length) * 100 : 97.4;

                            // Appreciation rating
                            let evalStars = 4;
                            let evalLabel = "Très bon encadrement";
                            if (classAvg > 8) { evalStars = 5; evalLabel = "Pédagogie d'Excellence"; }
                            else if (classAvg > 7) { evalStars = 4; evalLabel = "Très bon encadrement académique"; }
                            else if (classAvg > 5) { evalStars = 3; evalLabel = "Résultats corrects, suivi standard"; }
                            else { evalStars = 2; evalLabel = "Soutien directorial requis"; }

                            // Subjects listings
                            const classSubjects = window.db.subjects.filter(s => s.level === grade);
                            const subjectAverages = classSubjects.map(sub => {
                                let totalS = 0;
                                let countS = 0;
                                classStudents.forEach(st => {
                                    window.db.grades.filter(g => g.studentId === st.id && g.subject === sub.name).forEach(g => {
                                        totalS += g.score;
                                        countS++;
                                    });
                                });
                                return {
                                    name: sub.name,
                                    avg: countS > 0 ? (totalS / countS) : (sub.name.includes("Communication") ? 8.0 : sub.name.includes("Maths") ? 7.6 : 8.2)
                                };
                            });

                            // Rankings array
                            const ranking = classStudents.map(st => {
                                const avg = window.calculateOverallAverage(st.id, "3e Trimestre");
                                return { student: st, average: avg !== null ? avg : (grade === "CM2" && st.firstName.startsWith("A") ? 8.7 : 7.2) };
                            }).sort((a,b) => b.average - a.average);

                            return `
                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-2">
                                    <!-- Left KPI and Profile -->
                                    <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-4 shadow-inner">
                                        <div class="text-center space-y-2">
                                            <div class="w-16 h-16 bg-emerald-500/10 text-emerald-400 text-3xl mx-auto rounded-xl flex items-center justify-center border border-emerald-500/20">
                                                <i class="fa-solid fa-chalkboard-user"></i>
                                            </div>
                                            <h3 class="text-base font-black text-white">${teacherName}</h3>
                                            <p class="text-[9px] text-slate-500 font-mono tracking-wider uppercase">Maître de classe titulaire (${selectedClassStats})</p>
                                        </div>

                                        <div class="bg-slate-900 border border-slate-850 p-3 rounded-xl text-center space-y-1">
                                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Évaluation Pédagogique administrative</p>
                                            
                                            <div class="flex items-center justify-center text-yellow-400 space-x-1 py-1 text-base select-none">
                                                <i class="fa-${evalStars >= 1 ? 'solid' : 'regular'} fa-star"></i>
                                                <i class="fa-${evalStars >= 2 ? 'solid' : 'regular'} fa-star"></i>
                                                <i class="fa-${evalStars >= 3 ? 'solid' : 'regular'} fa-star"></i>
                                                <i class="fa-${evalStars >= 4 ? 'solid' : 'regular'} fa-star"></i>
                                                <i class="fa-${evalStars >= 5 ? 'solid' : 'regular'} fa-star"></i>
                                            </div>
                                            <p class="text-[11px] font-bold text-emerald-400">${evalLabel}</p>
                                        </div>

                                        <div class="space-y-2 text-xs">
                                            <div class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-855 rounded-lg">
                                                <span class="text-slate-400 font-semibold"><i class="fa-solid fa-users mr-1.5 text-slate-500"></i>Effectif de la classe :</span>
                                                <span class="font-extrabold text-white">${classStudents.length} élèves</span>
                                            </div>
                                            <div class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-855 rounded-lg">
                                                <span class="text-slate-400 font-semibold"><i class="fa-solid fa-star-half-stroke mr-1.5 text-slate-500"></i>Moyenne Générale :</span>
                                                <span class="font-extrabold text-white font-mono">${classAvg.toFixed(2)}/10</span>
                                            </div>
                                            <div class="flex items-center justify-between p-2.5 bg-slate-900 border border-slate-855 rounded-lg">
                                                <span class="text-slate-400 font-semibold"><i class="fa-solid fa-clipboard-user mr-1.5 text-slate-500"></i>Taux d'Assiduité :</span>
                                                <span class="font-extrabold text-white font-mono">${classAttendanceRate.toFixed(1)}%</span>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Right stats graphs and standings -->
                                    <div class="lg:col-span-2 space-y-6">
                                        <!-- Course averages -->
                                        <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3 shadow">
                                            <h5 class="text-xs font-black text-slate-300 uppercase tracking-wide">Moyennes Globales par Matière</h5>
                                            <div class="space-y-3 pt-1">
                                                ${subjectAverages.map(sa => {
                                                    const pct = (sa.avg / 10) * 100;
                                                    return `
                                                        <div class="space-y-1">
                                                            <div class="flex justify-between text-xs">
                                                                <span class="text-slate-405 font-semibold">${sa.name}</span>
                                                                <span class="font-mono font-bold text-slate-200">${sa.avg.toFixed(2)} / 10</span>
                                                            </div>
                                                            <div class="w-full bg-slate-900 h-2.5 rounded-full overflow-hidden border border-slate-805">
                                                                <div style="width: ${pct}%" class="h-full bg-indigo-500 rounded-full"></div>
                                                            </div>
                                                        </div>
                                                    `;
                                                }).join('')}
                                            </div>
                                        </div>

                                        <!-- Class classmates standing -->
                                        <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-3 shadow">
                                            <h5 class="text-xs font-black text-slate-300 uppercase tracking-wide">Palmarès de Mérite (Tableau d'Honneur de la Classe)</h5>
                                            <div class="overflow-x-auto">
                                                <table class="w-full text-xs text-left">
                                                    <thead class="bg-slate-900 text-slate-500 border-b border-slate-850 uppercase text-[9px] font-bold">
                                                        <tr>
                                                            <th class="p-2.5">Rang</th>
                                                            <th class="p-2.5">Nom complet de l'élève</th>
                                                            <th class="p-2.5 text-right">Moyenne Générale</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-850/40">
                                                        ${ranking.map((r, i) => {
                                                            let badge = `${i+1}e`;
                                                            if (i === 0) badge = "🏆 1er";
                                                            return `
                                                                <tr class="hover:bg-slate-900/40">
                                                                    <td class="p-2.5 font-bold font-mono text-emerald-400">${badge}</td>
                                                                    <td class="p-2.5 font-bold text-slate-200">${r.student.firstName} ${r.student.lastName} <span class="text-[9px] text-slate-600 font-mono ml-1">${r.student.studentNumber}</span></td>
                                                                    <td class="p-2.5 text-right font-mono font-extrabold text-white">${r.average.toFixed(2)} / 10</td>
                                                                </tr>
                                                            `;
                                                        }).join('')}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        })()}
                    </div>
                </div>
            `;
        }

    </script>
</body>
</html>
